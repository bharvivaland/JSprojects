<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2193b0, #6dd5ed);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }
        .game-container {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            padding: 20px 40px;
            text-align: center;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
        }
        h1 {
            margin-bottom: 20px;
        }
        input[type="number"] {
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        button {
            background-color: #ff5722;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #e64a19;
        }
        .message {
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Number Guessing Game</h1>
        <p>Guess a number between 1 and 100</p>
        <input type="number" id="guess" placeholder="Enter your guess" min="1" max="100">
        <br>
        <button onclick="checkGuess()">Submit</button>
        <p class="message" id="message"></p>
    </div>

    <script>
        let randomNumber = Math.floor(Math.random() * 100) + 1;
        let attempts = 0;

        function checkGuess() {
            const userGuess = parseInt(document.getElementById('guess').value);
            const message = document.getElementById('message');
            attempts++;

            if (isNaN(userGuess) || userGuess < 1 || userGuess > 100) {
                message.textContent = "Please enter a number between 1 and 100.";
                return;
            }

            if (userGuess === randomNumber) {
                message.textContent = `🎉 Congratulations! You guessed it in ${attempts} attempts.`;
                message.style.color = "#4CAF50"; // Success color
                document.getElementById('guess').disabled = true;
            } else if (userGuess > randomNumber) {
                message.textContent = "📉 Too high! Try again.";
                message.style.color = "#FFEB3B"; // Hint color
            } else {
                message.textContent = "📈 Too low! Try again.";
                message.style.color = "#FFEB3B"; // Hint color
            }
        }
    </script>
</body>
</html>
